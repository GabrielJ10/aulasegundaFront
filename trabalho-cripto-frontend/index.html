<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC2 - Cliente Criptográfico</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
            --success: #10B981;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--surface);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 760px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), #818CF8);
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .header p {
            margin: 8px 0 0 0;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .content {
            padding: 24px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            background-color: #FEE2E2;
            color: #EF4444;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .status-badge.connected {
            background-color: #D1FAE5;
            color: var(--success);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .section {
            border: 1px solid #E5E7EB;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .section h2 {
            margin: 0 0 12px 0;
            font-size: 1.05rem;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            box-sizing: border-box;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            box-sizing: border-box;
            background: #fff;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        .log-area {
            margin-top: 24px;
            background-color: #111827;
            color: #10B981;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 420px;
            overflow-y: auto;
            display: none;
            border: 1px solid #374151;
        }

        .hint {
            color: var(--text-light);
            font-size: 0.88rem;
            margin-top: -8px;
            margin-bottom: 12px;
        }

        .backend-config {
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: end;
        }

        .backend-config input {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .backend-config button {
            width: auto;
            padding: 12px 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Comunicação Segura</h1>
            <p>Simulação PC2 ➔ PC1</p>
        </div>
        
        <div class="content">
            <div id="status" class="status-badge">Aguardando Chave Pública...</div>

            <div class="backend-config">
                <div>
                    <label for="backendUrl">URL do Backend (Railway):</label>
                    <input id="backendUrl" type="text" placeholder="https://seu-backend.up.railway.app" />
                </div>
                <button id="btnSalvarUrl" type="button" onclick="salvarBackendUrl()">Salvar URL</button>
            </div>

            <div class="section">
                <h2>Fluxo 1: Mensagem Longa (Criptografia Híbrida)</h2>
                <div class="form-group">
                    <label for="mensagem">Mensagem para o PC1:</label>
                    <textarea id="mensagem" placeholder="Digite uma mensagem grande para testar...\nExemplo: cole alguns parágrafos."></textarea>
                </div>
                <button id="btnEnviar" disabled onclick="enviarMensagemHibrida()">Criptografar e Enviar Mensagem</button>
            </div>

            <div id="logArea" class="log-area"></div>
        </div>
    </div>

    <script>
        const hostPadrao = window.location.hostname || 'localhost';
        const protocoloPadrao = window.location.protocol === 'https:' ? 'https:' : 'http:';
        const backendPadrao = window.BACKEND_URL || `${protocoloPadrao}//${hostPadrao}:3000`;
        let BACKEND_URL = localStorage.getItem('backendUrl') || backendPadrao;

        let chavePublicaPem = null;
        let chavePublicaObjeto = null;

        function adicionarLog(texto) {
            const logArea = document.getElementById('logArea');
            logArea.style.display = 'block';
            logArea.innerHTML += texto + '\n\n';
            // Desce a barra de rolagem automaticamente para a última linha
            logArea.scrollTop = logArea.scrollHeight; 
        }

        function salvarBackendUrl() {
            const input = document.getElementById('backendUrl');
            const url = (input.value || '').trim().replace(/\/$/, '');

            if (!url) {
                alert('Informe uma URL válida do backend.');
                return;
            }

            BACKEND_URL = url;
            localStorage.setItem('backendUrl', BACKEND_URL);
            adicionarLog(`[CONFIG] URL do backend atualizada para: ${BACKEND_URL}`);
            document.getElementById('status').textContent = 'Reconectando ao backend...';
            document.getElementById('status').classList.remove('connected');
            buscarChavePublica();
        }

        function resumoBase64(base64) {
            if (!base64) {
                return '(vazio)';
            }

            const inicio = base64.slice(0, 80);
            const fim = base64.slice(-30);
            return `${inicio}...${fim} (len=${base64.length})`;
        }

        function calcularHashSha256Hex(textoClaro) {
            const md = forge.md.sha256.create();
            md.update(forge.util.encodeUtf8(textoClaro));
            return md.digest().toHex();
        }

        function verificarAssinaturaDigital(textoClaro, assinaturaDigitalBase64) {
            if (!assinaturaDigitalBase64 || typeof assinaturaDigitalBase64 !== 'string') {
                return false;
            }

            const md = forge.md.sha256.create();
            md.update(forge.util.encodeUtf8(textoClaro));
            const assinaturaBytes = forge.util.decode64(assinaturaDigitalBase64);
            return chavePublicaObjeto.verify(md.digest().bytes(), assinaturaBytes);
        }

        function criarPacoteHibrido(textoClaro) {
            if (!chavePublicaObjeto) {
                throw new Error('Chave pública ainda não carregada.');
            }

            const chaveSimetrica = forge.random.getBytesSync(32);
            const iv = forge.random.getBytesSync(12);
            const dadosUtf8 = forge.util.encodeUtf8(textoClaro);

            const cipher = forge.cipher.createCipher('AES-GCM', chaveSimetrica);
            cipher.start({ iv: iv, tagLength: 128 });
            cipher.update(forge.util.createBuffer(dadosUtf8));

            if (!cipher.finish()) {
                throw new Error('Falha ao gerar cifragem AES-GCM.');
            }

            const dadosCriptografados = cipher.output.getBytes();
            const tag = cipher.mode.tag.getBytes();

            const chaveSimetricaCriptografada = chavePublicaObjeto.encrypt(chaveSimetrica, 'RSA-OAEP', {
                md: forge.md.sha256.create(),
                mgf1: { md: forge.md.sha256.create() }
            });

            return {
                chaveSimetricaCriptografada: forge.util.encode64(chaveSimetricaCriptografada),
                iv: forge.util.encode64(iv),
                tag: forge.util.encode64(tag),
                dadosCriptografados: forge.util.encode64(dadosCriptografados)
            };
        }

        // 1. Busca a chave pública no backend (PC1)
        async function buscarChavePublica() {
            try {
                const resposta = await fetch(`${BACKEND_URL}/chave-publica`);
                const dados = await resposta.json();
                
                chavePublicaPem = dados.publicKey;
                chavePublicaObjeto = forge.pki.publicKeyFromPem(chavePublicaPem);
                
                const statusEl = document.getElementById('status');
                statusEl.textContent = '✓ Conectado & Chave Pública Recebida';
                statusEl.classList.add('connected');
                document.getElementById('btnEnviar').disabled = false;

                // Mostra a chave pública COMPLETA no console visual da página
                adicionarLog("🔑 [PASSO 1] Chave Pública recebida do PC1:\n" + chavePublicaPem);
                adicionarLog(`[INFO] Backend em uso: ${BACKEND_URL}`);
                
            } catch (erro) {
                console.error("Erro ao buscar chave:", erro);
                document.getElementById('status').textContent = 'Erro ao conectar com PC1';
                document.getElementById('btnEnviar').disabled = true;
                adicionarLog("[ERRO] Não foi possível conectar ao backend. O servidor do PC1 está rodando?");
            }
        }

        // 2. Criptografa e envia mensagem longa (híbrida) para o PC1
        async function enviarMensagemHibrida() {
            const textoMensagem = document.getElementById('mensagem').value;
            
            if (!textoMensagem) {
                alert("Por favor, digite uma mensagem.");
                return;
            }

            try {
                const pacote = criarPacoteHibrido(textoMensagem);
                const hashOrigem = calcularHashSha256Hex(textoMensagem);

                adicionarLog("📄 [MENSAGEM - ORIGEM] Conteúdo sem criptografia:\n" + textoMensagem);
                adicionarLog(`[🔍 MENSAGEM - ORIGEM] SHA-256: ${hashOrigem}`);
                adicionarLog("📦 [MENSAGEM - REDE] Chave AES cifrada (RSA):\n" + resumoBase64(pacote.chaveSimetricaCriptografada));
                adicionarLog("📦 [MENSAGEM - REDE] Dados cifrados (AES-GCM):\n" + resumoBase64(pacote.dadosCriptografados));

                const resposta = await fetch(`${BACKEND_URL}/mensagem-hibrida`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pacote })
                });

                const resultado = await resposta.json();

                if (resultado.sucesso) {
                    const temAssinatura = typeof resultado.assinaturaDigital === 'string' && resultado.assinaturaDigital.length > 0;
                    const temHash = typeof resultado.hashSha256 === 'string' && resultado.hashSha256.length > 0;
                    const assinaturaValida = temAssinatura
                        ? verificarAssinaturaDigital(resultado.mensagemOriginal, resultado.assinaturaDigital)
                        : false;
                    const hashConfere = temHash ? (hashOrigem === resultado.hashSha256) : false;

                    adicionarLog(`✅ [SUCESSO] Resposta do PC1: ${resultado.mensagem}`);
                    adicionarLog("📥 [MENSAGEM - DESTINO] Conteúdo descriptografado no PC1:\n" + resultado.mensagemOriginal);
                    adicionarLog(`[🔍 MENSAGEM - DESTINO] SHA-256: ${temHash ? resultado.hashSha256 : 'NÃO INFORMADO PELO BACKEND'}`);
                    adicionarLog(`[🔐 MENSAGEM - ASSINATURA] Válida no PC2: ${temAssinatura ? (assinaturaValida ? 'SIM' : 'NÃO') : 'NÃO INFORMADA PELO BACKEND'}`);
                    adicionarLog(`[✅ MENSAGEM - INTEGRIDADE] Hash origem == destino: ${temHash ? (hashConfere ? 'SIM' : 'NÃO') : 'NÃO FOI POSSÍVEL VALIDAR'}`);
                    document.getElementById('mensagem').value = ''; 
                } else {
                    adicionarLog(`❌ [ERRO] PC1 retornou: ${resultado.erro}`);
                }

            } catch (erro) {
                console.error("Erro no processo:", erro);
                adicionarLog(`❌ [ERRO INTERNO] Falha ao processar a mensagem: ${erro.message}`);
            }
        }

        // Inicia a busca pela chave assim que a página carrega
        document.getElementById('backendUrl').value = BACKEND_URL;
        buscarChavePublica();
    </script>
</body>
</html>
